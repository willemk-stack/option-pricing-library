name: deploy-docs

on:
  workflow_run:
    workflows: [docs-ci]
    types:
      - completed

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  stage-pages-artifact:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Load docs site contract
        id: docs_site_contract
        run: python scripts/docs_site_contract.py github-outputs

      - name: Download built docs site from docs-ci
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: ${{ steps.docs_site_contract.outputs.artifact_name }}
          path: ${{ steps.docs_site_contract.outputs.site_dir }}

      - name: Verify built docs site layout
        run: python scripts/docs_site_contract.py verify

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.docs_site_contract.outputs.site_dir }}

  deploy:
    runs-on: ubuntu-latest
    needs: stage-pages-artifact
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  verify-public-links:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Wait for GitHub Pages to serve the deployed site
        run: |
          for attempt in {1..18}; do
            if curl --silent --show-error --fail --head https://willemk-stack.github.io/option-pricing-library/ > /dev/null; then
              exit 0
            fi
            sleep 10
          done

          echo "GitHub Pages site did not become reachable within 3 minutes." >&2
          exit 1

      - name: Link check public README URLs
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          jobSummary: true
          args: >-
            --verbose
            --no-progress
            --format detailed
            README.md