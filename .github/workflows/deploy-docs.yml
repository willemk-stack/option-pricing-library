name: Deploy docs (MkDocs)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-docs.yml'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/check_docs_source_links.py'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/build_visual_artifacts.py'
      - 'scripts/docs_impact.py'
      - 'scripts/docs_site_contract.py'
      - 'scripts/render_d2_diagrams.py'
      - 'scripts/render_readme.py'
      - 'scripts/visual_audit/**'
      - 'src/option_pricing/**'
      - 'tests/visual/**'
      - 'benchmarks/artifacts/**'
      - 'benchmarks/*.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      D2_VERSION: "v0.7.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Load docs site contract
        id: docs_site_contract
        run: python scripts/docs_site_contract.py github-outputs

      - name: Install docs + plot deps + package
        run: |
          python -m pip install -U pip
          pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Check benchmark source freshness
        run: python scripts/build_benchmark_artifacts.py --check

      - name: Refresh generated README
        run: |
          python scripts/render_readme.py
          git diff --exit-code -- README.md

      - name: Install D2 (diagrams)
        run: |
          set -euo pipefail
          D2_TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$D2_TMP_DIR"' EXIT
          mkdir -p "$HOME/.local/bin"
          curl -fsSLo "$D2_TMP_DIR/d2.tgz" "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz"
          tar -xzf "$D2_TMP_DIR/d2.tgz" -C "$D2_TMP_DIR"
          D2_BIN="$(find "$D2_TMP_DIR" -type f -path '*/bin/d2' -print -quit)"
          test -x "$D2_BIN"
          install "$D2_BIN" "$HOME/.local/bin/d2"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/d2" --version

      - name: Render D2 diagrams
        run: |
          python scripts/render_d2_diagrams.py
          git diff --exit-code -- docs/assets/diagrams

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs figures
        run: |
          python scripts/build_visual_artifacts.py all --profile ci
          git diff --exit-code -- docs/assets/generated

      - name: Build site
        run: python -m mkdocs build --strict --site-dir "${{ steps.docs_site_contract.outputs.site_dir }}"

      - name: Upload built docs site
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.docs_site_contract.outputs.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.docs_site_contract.outputs.site_dir }}

  stage-pages-artifact:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Load docs site contract
        id: docs_site_contract
        run: python scripts/docs_site_contract.py github-outputs

      - name: Download built docs site
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.docs_site_contract.outputs.artifact_name }}
          path: ${{ steps.docs_site_contract.outputs.site_dir }}

      - name: Verify built docs site layout
        run: python scripts/docs_site_contract.py verify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.docs_site_contract.outputs.site_dir }}

  deploy:
    runs-on: ubuntu-latest
    needs: stage-pages-artifact
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  verify-public-links:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Wait for GitHub Pages to serve the deployed site
        run: |
          for attempt in {1..18}; do
            if curl --silent --show-error --fail --head https://willemk-stack.github.io/option-pricing-library/ > /dev/null; then
              exit 0
            fi
            sleep 10
          done

          echo "GitHub Pages site did not become reachable within 3 minutes." >&2
          exit 1

      - name: Link check public README URLs
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          jobSummary: true
          args: >-
            --verbose
            --no-progress
            --format detailed
            README.md
