name: validate-docs-artifacts

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: docs-artifacts-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-artifacts:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      DOCS_BASE_URL: http://127.0.0.1:8000/option-pricing-library/

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs,plot]"

      - name: Install Playwright dependencies
        working-directory: tests/visual
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Install D2
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s --
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render D2 diagrams
        run: python scripts/render_d2_diagrams.py

      - name: Build generated visual assets
        run: python scripts/build_visual_artifacts.py all --profile ci

      - name: Build MkDocs site strictly
        run: python -m mkdocs build --strict

      - name: Check generated asset integrity
        run: python scripts/visual_audit/check_svg_assets.py

      - name: Report visual state
        run: python scripts/visual_audit/report_visual_state.py

      - name: Run embedded panel checks
        working-directory: tests/visual
        env:
          SKIP_DOCS_PREBUILD: "1"
        run: npx playwright test embedded-panels.spec.ts

      - name: Upload artifact validation outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-artifact-validation
          if-no-files-found: ignore
          path: |
            artifacts/visual-state/**
            tests/visual/test-results/**