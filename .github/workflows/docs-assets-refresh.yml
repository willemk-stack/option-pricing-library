name: docs-assets-refresh

on:
  workflow_dispatch:
    inputs:
      refresh_readme:
        description: Refresh README.md from the template and examples.
        required: true
        type: boolean
        default: true
      refresh_diagrams:
        description: Refresh D2 diagrams under docs/assets/diagrams.
        required: true
        type: boolean
        default: true
      refresh_visual_assets:
        description: Refresh generated visual assets under docs/assets/generated.
        required: true
        type: boolean
        default: true
      refresh_performance_page:
        description: Refresh docs/performance.md from committed benchmark artifacts.
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-assets-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-24.04
    env:
      MPLBACKEND: Agg
      D2_VERSION: "v0.7.1"

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Refresh README
        if: inputs.refresh_readme
        run: python scripts/render_readme.py

      - name: Install D2
        if: inputs.refresh_diagrams
        run: bash scripts/install_d2.sh "${D2_VERSION}"

      - name: Refresh D2 diagrams
        if: inputs.refresh_diagrams
        run: python scripts/render_d2_diagrams.py

      - name: Refresh generated visual assets
        if: inputs.refresh_visual_assets
        run: python scripts/build_visual_artifacts.py all --profile ci

      - name: Refresh performance page
        if: inputs.refresh_performance_page
        run: python scripts/render_performance_page.py

      - name: Validate strict MkDocs build
        run: python -m mkdocs build --strict

      - name: Show refreshed files
        run: git status --short --untracked-files=all

      - name: Create draft refresh PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          branch: docs/refresh-generated-assets-${{ github.run_id }}
          commit-message: 'docs: refresh generated assets'
          title: 'docs: refresh generated assets'
          body: |
            Automated docs asset refresh.

            Inputs:
            - refresh_readme: `${{ inputs.refresh_readme }}`
            - refresh_diagrams: `${{ inputs.refresh_diagrams }}`
            - refresh_visual_assets: `${{ inputs.refresh_visual_assets }}`
            - refresh_performance_page: `${{ inputs.refresh_performance_page }}`

            Generated by `.github/workflows/docs-assets-refresh.yml`.
          draft: true