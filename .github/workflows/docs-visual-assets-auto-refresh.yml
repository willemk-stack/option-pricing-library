name: docs-visual-assets-auto-refresh

# Automatically regenerate docs/assets/generated/ and refresh authoritative
# Playwright sentinel snapshots on any non-main push that touches source code
# or docs content which feeds into those visuals.  Running in the exact same
# Ubuntu 24.04 environment (and with the same pinned deps) as docs-ci means
# the pixel-identical check in docs-ci always passes.
#
# When this job commits refreshed assets and snapshots back to the branch,
# docs-ci re-runs on that new commit with up-to-date assets and succeeds.
#
# The "github.actor != 'github-actions[bot]'" guard prevents the bot's own
# push from triggering another refresh cycle.

on:
  push:
    branches-ignore:
      - main
    paths:
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/docs-visual-assets-auto-refresh.yml'
      - 'benchmarks/artifacts/**'
      - 'docs/**'
      - 'src/option_pricing/**'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/build_visual_artifacts.py'

permissions:
  contents: write

concurrency:
  group: docs-visual-assets-auto-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Regenerate visual assets
        run: python scripts/build_visual_artifacts.py all --profile ci

      - name: Build MkDocs site for Playwright
        run: python -m mkdocs build --strict

      - name: Install Node dependencies
        working-directory: tests/visual
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: tests/visual
        run: npx playwright install --with-deps chromium

      - name: Refresh authoritative sentinel snapshots
        working-directory: tests/visual
        env:
          SKIP_DOCS_PREBUILD: "1"
          SERVE_PREBUILT_SITE: "1"
        run: npx playwright test sentinel.spec.ts --update-snapshots

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push refreshed assets
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/generated/
          git add tests/visual/sentinel.spec.ts-snapshots/
          git commit -m "docs: auto-refresh visual assets and snapshots"
          git push
