name: improve-docs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: docs-improvement-${{ github.ref }}
  cancel-in-progress: true

jobs:
  improvement-report:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      MPLBACKEND: Agg
      DOCS_BASE_URL: http://127.0.0.1:8000/option-pricing-library/
      D2_VERSION: "v0.7.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Install D2
        run: bash scripts/install_d2.sh "${D2_VERSION}"

      - name: Render D2 diagrams
        run: python scripts/render_d2_diagrams.py

      - name: Build generated visual assets
        run: python scripts/build_visual_artifacts.py all --profile ci

      - name: Build MkDocs site strictly
        run: python -m mkdocs build --strict

      - name: Install Playwright dependencies
        working-directory: tests/visual
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Run targeted Playwright audits
        run: |
          python scripts/run_docs_browser_audits.py verify \
            --skip-build \
            --tests smoke.spec.ts dom-audits.spec.ts math-audits.spec.ts embedded-panels.spec.ts \
            --project chromium-375 \
            --project chromium-1280 \
            --findings-json artifacts/docs-audit/findings.json

      - name: Generate improvement report
        run: python scripts/visual_audit/score_pages.py

      - name: Upload improvement artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: docs-improvement-report
          if-no-files-found: ignore
          path: |
            artifacts/docs-audit/**
            artifacts/visual-state/**
            tests/visual/test-results/**
