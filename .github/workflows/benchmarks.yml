name: benchmarks

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUN_BENCHMARKS: '1'
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[dev,docs,plot]"

      - name: Run benchmarks
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p benchmarks/artifacts

          ( while true; do
              echo "benchmarks still running @ $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              sleep 60
            done ) &
          KEEPALIVE_PID=$!
          trap 'kill $KEEPALIVE_PID' EXIT

          pytest benchmarks --benchmark-only --benchmark-json benchmarks/artifacts/pytest-benchmark.json --benchmark-verbose

      - name: Publish benchmark artifacts
        run: |
          python scripts/build_benchmark_artifacts.py \
            --pytest-benchmark-json benchmarks/artifacts/pytest-benchmark.json

      - name: Refresh performance page
        run: python scripts/render_performance_page.py

      - name: Upload raw benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-json
          path: benchmarks/artifacts/pytest-benchmark.json
          if-no-files-found: error

      - name: Upload derived benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: |
            benchmarks/artifacts
            docs/assets/generated/benchmarks
            docs/performance.md
          if-no-files-found: error

      - name: Create draft benchmark refresh PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: docs/refresh-benchmark-artifacts-${{ github.run_id }}
          commit-message: 'docs: refresh benchmark artifacts'
          title: 'docs: refresh benchmark artifacts'
          body: |
            Automated benchmark refresh.

            Updated outputs:
            - `benchmarks/artifacts/*`
            - `docs/assets/generated/benchmarks/*`
            - `docs/performance.md`

            Generated by `.github/workflows/benchmarks.yml`.
          draft: true