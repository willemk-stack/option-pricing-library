name: docs-advisory

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: docs-advisory-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-audits:
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      MPLBACKEND: Agg
      D2_VERSION: "v0.7.1"

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Install D2
        run: bash scripts/install_d2.sh "${D2_VERSION}"

      - name: Check README synchronization
        run: python scripts/render_readme.py --check

      - name: Check performance page synchronization
        run: python scripts/render_performance_page.py --check

      - name: Check D2 diagrams
        run: python scripts/render_d2_diagrams.py --check

      - name: Check generated visual assets
        run: python scripts/build_visual_artifacts.py all --profile ci --check

      - name: Build MkDocs site strictly
        run: python -m mkdocs build --strict

      - name: Check docs source links
        run: python scripts/check_docs_source_links.py

      - name: Install Playwright dependencies
        working-directory: tests/visual
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Link check docs sources and README
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          fail: true
          jobSummary: true
          args: >-
            --verbose
            --no-progress
            --format detailed
            docs/**/*.md README.md

      - name: Run advisory DOM, math, and accessibility audits
        run: |
          python scripts/run_docs_browser_audits.py verify \
            --skip-build \
            --tests dom-audits.spec.ts math-audits.spec.ts a11y.spec.ts \
            --project chromium-375 \
            --project chromium-768 \
            --project chromium-1280 \
            --project chromium-1536 \
            --findings-json artifacts/docs-audit/findings.json

      - name: Run full authoritative visual regression
        run: |
          python scripts/run_docs_browser_audits.py verify \
            --skip-build \
            --tests sentinel.spec.ts repo-facts.spec.ts pages.spec.ts components.spec.ts embedded-panels.spec.ts \
            --project chromium-375 \
            --project chromium-768 \
            --project chromium-1280 \
            --project chromium-1536

      - name: Upload advisory artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-advisory-linux-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/docs-audit/**
            artifacts/visual-state/**
            tests/visual/test-results/**

  windows-browser-checks:
    runs-on: windows-latest
    continue-on-error: true
    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Install Playwright dependencies
        working-directory: tests/visual
        run: |
          npm ci --no-audit --no-fund
          npx playwright install chromium

      - name: Build MkDocs site strictly
        run: python -m mkdocs build --strict

      - name: Run Playwright smoke checks
        working-directory: tests/visual
        env:
          SKIP_DOCS_PREBUILD: "1"
          SERVE_PREBUILT_SITE: "1"
        run: npx playwright test smoke.spec.ts

      - name: Run Playwright DOM and CSS audits
        working-directory: tests/visual
        env:
          SKIP_DOCS_PREBUILD: "1"
          SERVE_PREBUILT_SITE: "1"
        run: npx playwright test dom-audits.spec.ts

      - name: Run Playwright math audits
        working-directory: tests/visual
        env:
          SKIP_DOCS_PREBUILD: "1"
          SERVE_PREBUILT_SITE: "1"
        run: npx playwright test math-audits.spec.ts

      - name: Run Playwright accessibility checks
        working-directory: tests/visual
        env:
          SKIP_DOCS_PREBUILD: "1"
          SERVE_PREBUILT_SITE: "1"
        run: npx playwright test a11y.spec.ts

      - name: Upload Windows advisory artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-advisory-windows-artifacts
          if-no-files-found: ignore
          path: |
            tests/visual/test-results/**
