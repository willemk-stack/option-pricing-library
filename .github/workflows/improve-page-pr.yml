name: improve-page-pr

on:
  workflow_dispatch:
    inputs:
      page_key:
        description: Page spec key to improve, for example homepage or visual_report
        required: true
        default: homepage
      run_name:
        description: Output folder name under artifacts/visual-state/improvement-runs
        required: false
        default: workflow-pr
      edit_command:
        description: Shell command that applies the bounded page improvement
        required: true

concurrency:
  group: improve-page-pr-${{ github.ref }}-${{ inputs.page_key }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bounded-improvement-pr:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      DOCS_BASE_URL: http://127.0.0.1:8000/option-pricing-library/
      RUN_COMPONENT_SNAPSHOT_VALIDATION: "0"
      D2_VERSION: "v0.7.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Install Playwright dependencies
        working-directory: tests/visual
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Install D2
        run: bash scripts/install_d2.sh "${D2_VERSION}"

      - name: Run bounded improvement loop
        id: loop
        env:
          EDIT_COMMAND: ${{ inputs.edit_command }}
        run: |
          python scripts/visual_audit/run_improvement_loop.py \
            --page-key "${{ inputs.page_key }}" \
            --run-name "${{ inputs.run_name }}" \
            --edit-command "$EDIT_COMMAND"

      - name: Evaluate bounded improvement result
        id: evaluate
        env:
          PAGE_KEY: ${{ inputs.page_key }}
          RUN_NAME: ${{ inputs.run_name }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path("artifacts/visual-state/improvement-runs") / os.environ["RUN_NAME"] / os.environ["PAGE_KEY"] / "summary.json"
          payload = json.loads(summary_path.read_text(encoding="utf8"))
          after_ok = bool(payload["after"]["validation_ok"])
          edit_exit_code = payload["edit_exit_code"]
          should_open_pr = after_ok and edit_exit_code == 0

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf8") as handle:
              handle.write(f"summary_path={summary_path.as_posix()}\n")
              handle.write(f"after_validation_ok={'true' if after_ok else 'false'}\n")
              handle.write(f"edit_exit_code={'' if edit_exit_code is None else edit_exit_code}\n")
              handle.write(f"should_open_pr={'true' if should_open_pr else 'false'}\n")
          PY

      - name: Create draft improvement PR
        if: steps.evaluate.outputs.should_open_pr == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: 'docs/improve/${{ inputs.page_key }}-${{ github.run_id }}'
          commit-message: 'docs: bounded improve ${{ inputs.page_key }}'
          title: 'docs: bounded improve ${{ inputs.page_key }}'
          body: |
            Automated bounded docs improvement for `${{ inputs.page_key }}`.

            Validation summary:
            - Summary artifact path: `${{ steps.evaluate.outputs.summary_path }}`
            - After validation ok: `${{ steps.evaluate.outputs.after_validation_ok }}`
            - Edit command exit code: `${{ steps.evaluate.outputs.edit_exit_code }}`

            Generated by `.github/workflows/improve-page-pr.yml`.
          draft: true

      - name: Upload bounded loop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bounded-improvement-pr-${{ inputs.page_key }}
          if-no-files-found: ignore
          path: |
            artifacts/visual-state/improvement-runs/${{ inputs.run_name }}/${{ inputs.page_key }}/**
