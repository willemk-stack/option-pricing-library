name: docs-ci

on:
  pull_request:
    paths:
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/docs-advisory.yml'
      - '.github/workflows/docs-assets-refresh.yml'
      - '.github/workflows/benchmarks.yml'
      - 'README.template.md'
      - 'docs/**'
      - 'examples/**'
      - 'mkdocs.yml'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/build_visual_artifacts.py'
      - 'scripts/check_docs_source_links.py'
      - 'scripts/docs_doctor.py'
      - 'scripts/docs_impact.py'
      - 'scripts/docs_site_contract.py'
      - 'scripts/install_d2.sh'
      - 'scripts/pre_push_docs_validation.py'
      - 'scripts/render_d2_diagrams.py'
      - 'scripts/render_performance_page.py'
      - 'scripts/render_readme.py'
      - 'scripts/run_ci_visual_regression.py'
      - 'scripts/select_docs_visual_ci.py'
      - 'scripts/serve_docs.py'
      - 'scripts/templates/performance.md.template'
      - 'scripts/visual_audit/**'
      - 'src/option_pricing/**'
      - 'tests/visual/**'
      - 'benchmarks/artifacts/**'
      - 'benchmarks/*.py'
  workflow_run:
    workflows:
      - docs-visual-assets-auto-refresh
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/docs-advisory.yml'
      - '.github/workflows/docs-assets-refresh.yml'
      - '.github/workflows/benchmarks.yml'
      - 'README.template.md'
      - 'docs/**'
      - 'examples/**'
      - 'mkdocs.yml'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/build_visual_artifacts.py'
      - 'scripts/check_docs_source_links.py'
      - 'scripts/docs_doctor.py'
      - 'scripts/docs_impact.py'
      - 'scripts/docs_site_contract.py'
      - 'scripts/install_d2.sh'
      - 'scripts/pre_push_docs_validation.py'
      - 'scripts/render_d2_diagrams.py'
      - 'scripts/render_performance_page.py'
      - 'scripts/render_readme.py'
      - 'scripts/run_ci_visual_regression.py'
      - 'scripts/select_docs_visual_ci.py'
      - 'scripts/serve_docs.py'
      - 'scripts/templates/performance.md.template'
      - 'scripts/visual_audit/**'
      - 'src/option_pricing/**'
      - 'tests/visual/**'
      - 'benchmarks/artifacts/**'
      - 'benchmarks/*.py'
  workflow_dispatch:

concurrency:
  group: docs-ci-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    outputs:
      artifact_name: ${{ steps.docs_site_contract.outputs.artifact_name }}
      site_dir: ${{ steps.docs_site_contract.outputs.site_dir }}
      docs_site_required: ${{ steps.docs_impact.outputs.docs_site_required }}
      selected_tests: ${{ steps.docs_impact.outputs.selected_tests }}
      review_paths: ${{ steps.docs_impact.outputs.review_paths }}
      a11y_paths: ${{ steps.docs_impact.outputs.a11y_paths }}
      full_review: ${{ steps.docs_impact.outputs.full_review }}
    env:
      MPLBACKEND: Agg
      D2_VERSION: "v0.7.1"

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Determine docs impact
        id: docs_impact
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/docs_impact.py github-outputs \
              --base-ref "${{ github.event.pull_request.base.sha }}" \
              --head-ref "${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            python scripts/docs_impact.py github-outputs \
              --base-ref "${{ github.event.before }}" \
              --head-ref "${{ github.sha }}"
          else
            python scripts/docs_impact.py github-outputs --full
          fi

      - name: Load docs site contract
        id: docs_site_contract
        run: python scripts/docs_site_contract.py github-outputs

      - name: Set up Node
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Python dependencies
        if: steps.docs_impact.outputs.docs_sensitive == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Check performance snapshot freshness
        if: steps.docs_impact.outputs.benchmark_artifacts_required == 'true'
        run: python scripts/build_benchmark_artifacts.py --check

      - name: Check README synchronization
        if: steps.docs_impact.outputs.readme_required == 'true'
        run: python scripts/render_readme.py --check

      - name: Check performance page synchronization
        if: steps.docs_impact.outputs.performance_page_required == 'true'
        run: python scripts/render_performance_page.py --check

      - name: Install D2
        if: steps.docs_impact.outputs.d2_required == 'true'
        run: bash scripts/install_d2.sh "${D2_VERSION}"

      - name: Check D2 diagrams
        if: steps.docs_impact.outputs.d2_required == 'true'
        run: python scripts/render_d2_diagrams.py --check

      - name: Check generated visual assets
        if: steps.docs_impact.outputs.visual_assets_required == 'true'
        run: python scripts/build_visual_artifacts.py all --profile ci --check

      - name: Check docs source links
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python scripts/check_docs_source_links.py

      - name: Build MkDocs site strictly
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python -m mkdocs build --strict --site-dir "${{ steps.docs_site_contract.outputs.site_dir }}"

      - name: Check generated asset integrity
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python scripts/visual_audit/check_svg_assets.py

      - name: Report visual state
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python scripts/visual_audit/report_visual_state.py

      - name: Upload built docs site
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.docs_site_contract.outputs.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.docs_site_contract.outputs.site_dir }}

      - name: Upload docs build artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-ci-build-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/visual-state/**

  browser-audits:
    if: needs.build.outputs.docs_site_required == 'true'
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Playwright dependencies
        working-directory: tests/visual
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Download built docs site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ needs.build.outputs.site_dir }}

      - name: Verify built docs site layout
        run: python scripts/docs_site_contract.py verify

      - name: Run Playwright smoke and DOM audits
        working-directory: tests/visual
        env:
          REVIEW_PATHS: ${{ needs.build.outputs.review_paths }}
          SKIP_DOCS_PREBUILD: "1"
          SERVE_PREBUILT_SITE: "1"
        run: npx playwright test smoke.spec.ts dom-audits.spec.ts

      - name: Run Playwright accessibility checks
        if: needs.build.outputs.full_review == 'true' || needs.build.outputs.a11y_paths != ''
        working-directory: tests/visual
        env:
          REVIEW_PATHS: ${{ needs.build.outputs.a11y_paths }}
          SKIP_DOCS_PREBUILD: "1"
          SERVE_PREBUILT_SITE: "1"
        run: npx playwright test a11y.spec.ts

      - name: Upload browser audit artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-ci-browser-audit-artifacts
          if-no-files-found: ignore
          path: |
            tests/visual/test-results/**

  authoritative-visual:
    if: needs.build.outputs.docs_site_required == 'true'
    needs: build
    runs-on: ubuntu-24.04
    env:
      REVIEW_PATHS: ${{ needs.build.outputs.review_paths }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download built docs site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ needs.build.outputs.site_dir }}

      - name: Verify built docs site layout
        run: python scripts/docs_site_contract.py verify

      - name: Run docs-impact-selected authoritative visual suites
        run: |
          python scripts/run_ci_visual_regression.py verify \
            --skip-build \
            --tests ${{ needs.build.outputs.selected_tests }}

      - name: Upload authoritative visual artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-ci-authoritative-visual-artifacts
          if-no-files-found: ignore
          path: |
            tests/visual/test-results/**

  stage-pages-artifact:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.docs_site_required == 'true'
    needs:
      - build
      - browser-audits
      - authoritative-visual
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download built docs site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ needs.build.outputs.site_dir }}

      - name: Verify built docs site layout
        run: python scripts/docs_site_contract.py verify

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ${{ needs.build.outputs.site_dir }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.docs_site_required == 'true'
    needs:
      - build
      - stage-pages-artifact
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  verify-public-site:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.docs_site_required == 'true'
    needs:
      - build
      - deploy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Wait for GitHub Pages to serve the deployed site
        run: |
          for attempt in {1..18}; do
            if curl --silent --show-error --fail --head "${{ needs.deploy.outputs.page_url }}" > /dev/null; then
              exit 0
            fi
            sleep 10
          done

          echo "GitHub Pages site did not become reachable within 3 minutes." >&2
          exit 1

      - name: Verify published docs routes
        run: |
          python scripts/docs_site_contract.py verify-public \
            --base-url "${{ needs.deploy.outputs.page_url }}"
