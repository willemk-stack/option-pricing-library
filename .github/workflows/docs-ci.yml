name: docs-ci

on:
  pull_request:
    paths:
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/docs-advisory.yml'
      - '.github/workflows/docs-assets-refresh.yml'
      - '.github/workflows/benchmarks.yml'
      - 'README.template.md'
      - 'docs/**'
      - 'examples/**'
      - 'mkdocs.yml'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/build_visual_artifacts.py'
      - 'scripts/check_docs_source_links.py'
      - 'scripts/docs_audit_plan.py'
      - 'scripts/docs_doctor.py'
      - 'scripts/docs_impact.py'
      - 'scripts/docs_site_contract.py'
      - 'scripts/pre_push_docs_validation.py'
      - 'scripts/render_d2_diagrams.py'
      - 'scripts/render_performance_page.py'
      - 'scripts/render_readme.py'
      - 'scripts/run_docs_browser_audits.py'
      - 'scripts/run_ci_visual_regression.py'
      - 'scripts/select_docs_visual_ci.py'
      - 'scripts/serve_docs.py'
      - 'scripts/templates/performance.md.template'
      - 'scripts/visual_audit/**'
      - 'src/option_pricing/**'
      - 'tests/visual/**'
      - 'benchmarks/artifacts/**'
      - 'benchmarks/*.py'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/docs-advisory.yml'
      - '.github/workflows/docs-assets-refresh.yml'
      - '.github/workflows/benchmarks.yml'
      - 'README.template.md'
      - 'docs/**'
      - 'examples/**'
      - 'mkdocs.yml'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/build_visual_artifacts.py'
      - 'scripts/check_docs_source_links.py'
      - 'scripts/docs_audit_plan.py'
      - 'scripts/docs_doctor.py'
      - 'scripts/docs_impact.py'
      - 'scripts/docs_site_contract.py'
      - 'scripts/pre_push_docs_validation.py'
      - 'scripts/render_d2_diagrams.py'
      - 'scripts/render_performance_page.py'
      - 'scripts/render_readme.py'
      - 'scripts/run_docs_browser_audits.py'
      - 'scripts/run_ci_visual_regression.py'
      - 'scripts/select_docs_visual_ci.py'
      - 'scripts/serve_docs.py'
      - 'scripts/templates/performance.md.template'
      - 'scripts/visual_audit/**'
      - 'src/option_pricing/**'
      - 'tests/visual/**'
      - 'benchmarks/artifacts/**'
      - 'benchmarks/*.py'
  workflow_dispatch:

concurrency:
  group: docs-ci-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      artifact_name: ${{ steps.docs_site_contract.outputs.artifact_name }}
      site_dir: ${{ steps.docs_site_contract.outputs.site_dir }}
      docs_site_required: ${{ steps.docs_impact.outputs.docs_site_required }}
      review_paths: ${{ steps.docs_audit_plan.outputs.review_paths }}
      a11y_paths: ${{ steps.docs_audit_plan.outputs.a11y_paths }}
      full_review: ${{ steps.docs_audit_plan.outputs.full_review }}
      blocking_suites: ${{ steps.docs_audit_plan.outputs.blocking_suites }}
      a11y_suites: ${{ steps.docs_audit_plan.outputs.a11y_suites }}
      blocking_projects: ${{ steps.docs_audit_plan.outputs.blocking_projects }}
      a11y_projects: ${{ steps.docs_audit_plan.outputs.a11y_projects }}
      audit_plan_json: ${{ steps.docs_audit_plan.outputs.audit_plan_json }}
    env:
      MPLBACKEND: Agg
      D2_VERSION: "v0.7.1"

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Determine docs impact
        id: docs_impact
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/docs_impact.py github-outputs \
              --base-ref "${{ github.event.pull_request.base.sha }}" \
              --head-ref "${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            python scripts/docs_impact.py github-outputs \
              --base-ref "${{ github.event.before }}" \
              --head-ref "${{ github.sha }}"
          else
            python scripts/docs_impact.py github-outputs --full
          fi

      - name: Load docs site contract
        id: docs_site_contract
        run: python scripts/docs_site_contract.py github-outputs

      - name: Install Python dependencies
        if: steps.docs_impact.outputs.docs_sensitive == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Determine docs audit plan
        id: docs_audit_plan
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/docs_audit_plan.py --format github-outputs \
              --base-ref "${{ github.event.pull_request.base.sha }}" \
              --head-ref "${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            python scripts/docs_audit_plan.py --format github-outputs \
              --base-ref "${{ github.event.before }}" \
              --head-ref "${{ github.sha }}"
          else
            python scripts/docs_audit_plan.py --format github-outputs --full
          fi

      - name: Check performance snapshot freshness
        if: steps.docs_impact.outputs.benchmark_artifacts_required == 'true'
        run: python scripts/build_benchmark_artifacts.py --check

      - name: Check README synchronization
        if: steps.docs_impact.outputs.readme_required == 'true'
        run: python scripts/render_readme.py --check

      - name: Check performance page synchronization
        if: steps.docs_impact.outputs.performance_page_required == 'true'
        run: python scripts/render_performance_page.py --check

      - name: Check D2 diagrams
        if: steps.docs_impact.outputs.d2_required == 'true'
        run: |
          bash scripts/install_d2.sh "${D2_VERSION}"
          python scripts/render_d2_diagrams.py --check

      - name: Check docs source links
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python scripts/check_docs_source_links.py

      - name: Build MkDocs site strictly
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python -m mkdocs build --strict --site-dir "${{ steps.docs_site_contract.outputs.site_dir }}"

      - name: Check generated asset integrity
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python scripts/visual_audit/check_svg_assets.py

      - name: Report visual state
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python scripts/visual_audit/report_visual_state.py

      - name: Upload built docs site
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.docs_site_contract.outputs.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.docs_site_contract.outputs.site_dir }}

      - name: Upload docs build artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-ci-build-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/visual-state/**

  browser-audits:
    if: needs.build.outputs.docs_site_required == 'true'
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Download built docs site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ needs.build.outputs.site_dir }}

      - name: Verify built docs site layout
        run: python scripts/docs_site_contract.py verify

      - name: Install Playwright dependencies
        working-directory: tests/visual
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Run blocking browser audits
        env:
          AUDIT_PLAN_JSON: ${{ needs.build.outputs.audit_plan_json }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          plan = json.loads(os.environ["AUDIT_PLAN_JSON"])
          command = [
              sys.executable,
              "scripts/run_docs_browser_audits.py",
              "verify",
              "--skip-build",
              "--tests",
              *plan["blocking_suites"],
              "--findings-json",
              "artifacts/docs-audit/blocking-findings.json",
              "--summary-md",
              "artifacts/docs-audit/blocking-summary.md",
          ]
          for project in plan["blocking_projects"]:
              command.extend(["--project", project])
          if plan["review_paths"]:
              command.extend(["--review-paths", *plan["review_paths"]])
          subprocess.run(command, check=True)
          PY

      - name: Run curated accessibility audits
        if: needs.build.outputs.a11y_suites != ''
        env:
          AUDIT_PLAN_JSON: ${{ needs.build.outputs.audit_plan_json }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          plan = json.loads(os.environ["AUDIT_PLAN_JSON"])
          command = [
              sys.executable,
              "scripts/run_docs_browser_audits.py",
              "verify",
              "--skip-build",
              "--tests",
              *plan["a11y_suites"],
              "--findings-json",
              "artifacts/docs-audit/a11y-findings.json",
              "--summary-md",
              "artifacts/docs-audit/a11y-summary.md",
          ]
          for project in plan["a11y_projects"]:
              command.extend(["--project", project])
          if plan["a11y_paths"]:
              command.extend(["--review-paths", *plan["a11y_paths"]])
          subprocess.run(command, check=True)
          PY

      - name: Combine docs audit findings
        if: always()
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, "scripts")
          import run_docs_browser_audits as runner

          root = Path("artifacts/docs-audit")
          root.mkdir(parents=True, exist_ok=True)
          findings = []
          for name in ("blocking-findings.json", "a11y-findings.json"):
              path = root / name
              if not path.is_file():
                  continue
              payload = json.loads(path.read_text(encoding="utf8"))
              if isinstance(payload, list):
                  findings.extend(entry for entry in payload if isinstance(entry, dict))
          (root / "findings.json").write_text(
              json.dumps(findings, indent=2),
              encoding="utf8",
          )
          runner.write_findings_summary(root / "summary.md", findings)
          PY

      - name: Upload browser audit artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-ci-browser-audit-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/docs-audit/**
            tests/visual/test-results/**
            tests/visual/playwright-report/**
            artifacts/pre_push/**

  stage-pages-artifact:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.docs_site_required == 'true'
    needs:
      - build
      - browser-audits
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download built docs site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ needs.build.outputs.site_dir }}

      - name: Verify built docs site layout
        run: python scripts/docs_site_contract.py verify

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ${{ needs.build.outputs.site_dir }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.docs_site_required == 'true'
    needs:
      - build
      - stage-pages-artifact
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  verify-public-site:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.docs_site_required == 'true'
    needs:
      - build
      - deploy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Wait for GitHub Pages to serve the deployed site
        run: |
          for attempt in {1..18}; do
            if curl --silent --show-error --fail --head "${{ needs.deploy.outputs.page_url }}" > /dev/null; then
              exit 0
            fi
            sleep 10
          done

          echo "GitHub Pages site did not become reachable within 3 minutes." >&2
          exit 1

      - name: Verify published docs routes
        run: |
          python scripts/docs_site_contract.py verify-public \
            --base-url "${{ needs.deploy.outputs.page_url }}"
