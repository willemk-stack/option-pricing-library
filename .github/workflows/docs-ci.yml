name: docs-ci

on:
  pull_request:
    paths:
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/docs-advisory.yml'
      - '.github/workflows/docs-assets-refresh.yml'
      - '.github/workflows/deploy-docs.yml'
      - '.github/workflows/benchmarks.yml'
      - 'README.template.md'
      - 'docs/**'
      - 'examples/**'
      - 'mkdocs.yml'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/build_visual_artifacts.py'
      - 'scripts/check_docs_source_links.py'
      - 'scripts/docs_doctor.py'
      - 'scripts/docs_impact.py'
      - 'scripts/docs_site_contract.py'
      - 'scripts/install_d2.sh'
      - 'scripts/pre_push_docs_validation.py'
      - 'scripts/render_d2_diagrams.py'
      - 'scripts/render_performance_page.py'
      - 'scripts/render_readme.py'
      - 'scripts/run_ci_visual_regression.py'
      - 'scripts/select_docs_visual_ci.py'
      - 'scripts/serve_docs.py'
      - 'scripts/templates/performance.md.template'
      - 'scripts/visual_audit/**'
      - 'src/option_pricing/**'
      - 'tests/visual/**'
      - 'benchmarks/artifacts/**'
      - 'benchmarks/*.py'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docs-ci.yml'
      - '.github/workflows/docs-advisory.yml'
      - '.github/workflows/docs-assets-refresh.yml'
      - '.github/workflows/deploy-docs.yml'
      - '.github/workflows/benchmarks.yml'
      - 'README.template.md'
      - 'docs/**'
      - 'examples/**'
      - 'mkdocs.yml'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/build_visual_artifacts.py'
      - 'scripts/check_docs_source_links.py'
      - 'scripts/docs_doctor.py'
      - 'scripts/docs_impact.py'
      - 'scripts/docs_site_contract.py'
      - 'scripts/install_d2.sh'
      - 'scripts/pre_push_docs_validation.py'
      - 'scripts/render_d2_diagrams.py'
      - 'scripts/render_performance_page.py'
      - 'scripts/render_readme.py'
      - 'scripts/run_ci_visual_regression.py'
      - 'scripts/select_docs_visual_ci.py'
      - 'scripts/serve_docs.py'
      - 'scripts/templates/performance.md.template'
      - 'scripts/visual_audit/**'
      - 'src/option_pricing/**'
      - 'tests/visual/**'
      - 'benchmarks/artifacts/**'
      - 'benchmarks/*.py'
  workflow_dispatch:

concurrency:
  group: docs-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      artifact_name: ${{ steps.docs_site_contract.outputs.artifact_name }}
      site_dir: ${{ steps.docs_site_contract.outputs.site_dir }}
      docs_site_required: ${{ steps.docs_impact.outputs.docs_site_required }}
      selected_tests: ${{ steps.docs_impact.outputs.selected_tests }}
      review_paths: ${{ steps.docs_impact.outputs.review_paths }}
    env:
      MPLBACKEND: Agg
      D2_VERSION: "v0.7.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Determine docs impact
        id: docs_impact
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/docs_impact.py github-outputs \
              --base-ref "${{ github.event.pull_request.base.sha }}" \
              --head-ref "${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            python scripts/docs_impact.py github-outputs \
              --base-ref "${{ github.event.before }}" \
              --head-ref "${{ github.sha }}"
          else
            python scripts/docs_impact.py github-outputs --full
          fi

      - name: Load docs site contract
        id: docs_site_contract
        run: python scripts/docs_site_contract.py github-outputs

      - name: Set up Node
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Python dependencies
        if: steps.docs_impact.outputs.docs_sensitive == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Check benchmark source freshness
        if: steps.docs_impact.outputs.benchmark_artifacts_required == 'true'
        run: python scripts/build_benchmark_artifacts.py --check

      - name: Check README synchronization
        if: steps.docs_impact.outputs.readme_required == 'true'
        run: python scripts/render_readme.py --check

      - name: Check performance page synchronization
        if: steps.docs_impact.outputs.performance_page_required == 'true'
        run: python scripts/render_performance_page.py --check

      - name: Install D2
        if: steps.docs_impact.outputs.d2_required == 'true'
        run: bash scripts/install_d2.sh "${D2_VERSION}"

      - name: Render D2 diagrams
        if: steps.docs_impact.outputs.d2_required == 'true'
        run: python scripts/render_d2_diagrams.py

      - name: Build generated visual assets
        if: steps.docs_impact.outputs.visual_assets_required == 'true'
        run: python scripts/build_visual_artifacts.py all --profile ci

      - name: Check docs source links
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python scripts/check_docs_source_links.py

      - name: Build MkDocs site strictly
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python -m mkdocs build --strict --site-dir "${{ steps.docs_site_contract.outputs.site_dir }}"

      - name: Check generated asset integrity
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python scripts/visual_audit/check_svg_assets.py

      - name: Report visual state
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        run: python scripts/visual_audit/report_visual_state.py

      - name: Upload built docs site
        if: steps.docs_impact.outputs.docs_site_required == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.docs_site_contract.outputs.artifact_name }}
          if-no-files-found: error
          path: ${{ steps.docs_site_contract.outputs.site_dir }}

      - name: Upload docs build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-ci-build-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/visual-state/**

  smoke:
    if: needs.build.outputs.docs_site_required == 'true'
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Playwright dependencies
        working-directory: tests/visual
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Download built docs site
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ needs.build.outputs.site_dir }}

      - name: Verify built docs site layout
        run: python scripts/docs_site_contract.py verify

      - name: Run Playwright smoke checks
        working-directory: tests/visual
        env:
          REVIEW_PATHS: ${{ needs.build.outputs.review_paths }}
          SKIP_DOCS_PREBUILD: "1"
          SERVE_PREBUILT_SITE: "1"
        run: npx playwright test smoke.spec.ts

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-ci-smoke-artifacts
          if-no-files-found: ignore
          path: |
            tests/visual/test-results/**

  embedded-panels:
    if: needs.build.outputs.docs_site_required == 'true' && contains(needs.build.outputs.selected_tests, 'embedded-panels.spec.ts')
    needs: build
    runs-on: ubuntu-24.04
    env:
      REVIEW_PATHS: ${{ needs.build.outputs.review_paths }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download built docs site
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ needs.build.outputs.site_dir }}

      - name: Verify built docs site layout
        run: python scripts/docs_site_contract.py verify

      - name: Run targeted embedded panel verification
        run: |
          python scripts/run_ci_visual_regression.py verify \
            --skip-build \
            --tests repo-facts.spec.ts sentinel.spec.ts embedded-panels.spec.ts

      - name: Upload embedded panel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-ci-embedded-panel-artifacts
          if-no-files-found: ignore
          path: |
            tests/visual/test-results/**
