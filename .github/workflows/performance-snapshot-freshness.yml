name: performance-snapshot-freshness

on:
  pull_request:
    paths:
      - '.github/workflows/performance-snapshot-freshness.yml'
      - 'benchmarks/**'
      - 'docs/performance.md'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/render_performance_page.py'
      - 'scripts/templates/performance.md.template'
      - 'src/option_pricing/models/**'
      - 'src/option_pricing/numerics/**'
      - 'src/option_pricing/pricers/**'
      - 'src/option_pricing/types.py'
      - 'src/option_pricing/vol/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/performance-snapshot-freshness.yml'
      - 'benchmarks/**'
      - 'docs/performance.md'
      - 'scripts/build_benchmark_artifacts.py'
      - 'scripts/render_performance_page.py'
      - 'scripts/templates/performance.md.template'
      - 'src/option_pricing/models/**'
      - 'src/option_pricing/numerics/**'
      - 'src/option_pricing/pricers/**'
      - 'src/option_pricing/types.py'
      - 'src/option_pricing/vol/**'
  workflow_dispatch:

concurrency:
  group: performance-snapshot-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  freshness:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            scripts/ci-constraints.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Check performance snapshot freshness
        run: python scripts/build_benchmark_artifacts.py --check