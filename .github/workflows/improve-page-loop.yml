name: improve-page-loop

on:
  workflow_dispatch:
    inputs:
      page_key:
        description: Page spec key to review, for example homepage or visual_report
        required: true
        default: homepage
      run_name:
        description: Output folder name under artifacts/visual-state/improvement-runs
        required: false
        default: workflow-dispatch
      projects:
        description: Space-separated Playwright projects, for example chromium-375 chromium-1280
        required: false
        default: chromium-375 chromium-1280
      suites:
        description: Optional space-separated validation suite labels, for example review-capture smoke dom-audits a11y
        required: false
        default: ""

concurrency:
  group: improve-page-loop-${{ github.ref }}-${{ inputs.page_key }}
  cancel-in-progress: true

jobs:
  bounded-loop:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      MPLBACKEND: Agg
      DOCS_BASE_URL: http://127.0.0.1:8000/option-pricing-library/
      RUN_COMPONENT_SNAPSHOT_VALIDATION: "0"
      D2_VERSION: "v0.7.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/visual/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c scripts/ci-constraints.txt -e ".[docs,plot]"

      - name: Install Playwright dependencies
        working-directory: tests/visual
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Install D2
        run: bash scripts/install_d2.sh "${D2_VERSION}"

      - name: Run bounded improvement loop
        env:
          LOOP_PAGE_KEY: ${{ inputs.page_key }}
          LOOP_PROJECTS: ${{ inputs.projects }}
          LOOP_RUN_NAME: ${{ inputs.run_name }}
          LOOP_SUITES: ${{ inputs.suites }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys

          command = [
              sys.executable,
              "scripts/visual_audit/run_improvement_loop.py",
              "--page-key",
              os.environ["LOOP_PAGE_KEY"],
              "--run-name",
              os.environ["LOOP_RUN_NAME"],
          ]
          for project in os.environ.get("LOOP_PROJECTS", "").split():
              command.extend(["--project", project])
          for suite in os.environ.get("LOOP_SUITES", "").split():
              command.extend(["--suite", suite])
          subprocess.run(command, check=True)
          PY

      - name: Upload bounded loop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bounded-improvement-loop-${{ inputs.page_key }}
          if-no-files-found: ignore
          path: |
            artifacts/visual-state/improvement-runs/${{ inputs.run_name }}/${{ inputs.page_key }}/**
