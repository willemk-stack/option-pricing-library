site_name: option_pricing
site_url: https://willemk-stack.github.io/option-pricing-library/
repo_url: https://github.com/willemk-stack/option-pricing-library
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: mkdocs_overrides
  language: en
  font: false
  icon:
    repo: fontawesome/brands/github

  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    

  features:
    # Navigation / layout
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top

    # TOC behavior (right sidebar)
    - toc.follow

    # Search UX
    - search.suggest
    - search.highlight
    - search.share

    # Content UX
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false

            # Prevent repeated "option_pricing" headings & TOC entries
            show_root_heading: false
            show_root_toc_entry: false

            # Nest API object headings cleanly under page-level H2 sections
            heading_level: 3

            # Nice defaults
            members_order: source
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - meta

  # Better Markdown ergonomics for Material
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight

  # Lists/tables/images tweaks often needed in docs
  - attr_list
  - md_in_html

  # Footnotes you already use
  - footnotes

  # Math support (works with your MathJax includes below)
  - pymdownx.arithmatex:
      generic: true

  # TOC settings (reduces “weird indents” and excessive depth)
  - toc:
      permalink: true
      toc_depth: 3
extra_javascript:
  - javascripts/mathjax.js
  - javascripts/proof-path-lightbox.js
  - javascripts/vendor/tex-mml-svg.js

# Load custom docs CSS by concern. Keep this order stable: tokens first,
# shared typography/base rules next, Material overrides, components,
# route/page-specific styles, API overflow guards, then responsive fixes.
extra_css:
  - stylesheets/tokens.css
  - stylesheets/base.css
  - stylesheets/mkdocs-overrides.css
  - stylesheets/components.css
  - stylesheets/homepage.css
  - stylesheets/diagrams.css
  - stylesheets/api-reference.css
  - stylesheets/responsive.css

