<text x="250" y="330" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="17" font-weight="500" fill="#5A7185" id="architecture-card-heston-body" data-max-width="244" data-max-height="80" data-line-height="24" text-anchor="middle"><tspan x="250" dy="0">Fourier pricing</tspan><tspan x="250" dy="24">Multistart fit</tspan><tspan x="250" dy="24">Residual diagnostics</tspan></text>
