<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Heston workflow architecture</title>
  <desc id="desc">Synthetic quote target flows into Heston Fourier pricing and calibration, QE Monte Carlo validation, and the eSSVI/local-vol/PDE baseline before a final model-choice comparison layer.</desc>
  <rect x="0" y="0" width="1180" height="760" rx="24" fill="#ffffff"/>
  <rect x="100" y="44" width="980" height="96" rx="20" fill="#eef6f8" stroke="#0f4c5c" stroke-width="2"/>
