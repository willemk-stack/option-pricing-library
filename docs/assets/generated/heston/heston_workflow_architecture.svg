  <rect x="180" y="500" width="820" height="118" rx="24" fill="#f8fafc" stroke="#d7e0ea" stroke-width="2.5"/>
  <text x="590" y="546" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#0B1F33" id="architecture-comparison-title" data-max-width="700" data-max-height="36" data-line-height="34" text-anchor="middle"><tspan x="590" dy="0">Model-choice comparison</tspan></text>
  <text x="590" y="582" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="19" font-weight="500" fill="#5A7185" id="architecture-comparison-subtitle" data-max-width="760" data-max-height="24" data-line-height="24" text-anchor="middle"><tspan x="590" dy="0">Fit | stability | dynamics | failure modes</tspan></text>
  <line x1="150" y1="646" x2="1030" y2="646" stroke="#d7e0ea" stroke-width="1.5" stroke-linecap="round"/>
  <text x="590" y="670" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="14" font-weight="500" fill="#5A7185" id="architecture-footer" data-max-width="920" data-max-height="42" data-line-height="19" text-anchor="middle"><tspan x="590" dy="0">Synthetic deterministic target; not market data.</tspan><tspan x="590" dy="19">Capstone 3 compares Heston against the eSSVI/local-vol baseline rather than declaring a universal winner.</tspan></text>
</svg>
