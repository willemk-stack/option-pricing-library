  <text x="590" y="114" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="17" font-weight="500" fill="#5A7185" id="architecture-source-subtitle" data-max-width="820" data-max-height="24" data-line-height="22" text-anchor="middle"><tspan x="590" dy="0">Deterministic market-like fixture</tspan></text>
