  <line x1="590" y1="416" x2="590" y2="454" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <line x1="930" y1="416" x2="930" y2="454" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
