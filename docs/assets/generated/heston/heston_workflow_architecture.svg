<text x="590" y="330" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="17" font-weight="500" fill="#5A7185" id="architecture-card-monte-carlo-body" data-max-width="244" data-max-height="80" data-line-height="24" text-anchor="middle"><tspan x="590" dy="0">QE paths</tspan><tspan x="590" dy="24">CI vs Fourier</tspan><tspan x="590" dy="24">Bias/runtime check</tspan></text>
