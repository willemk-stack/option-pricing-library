<text x="930" y="330" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="17" font-weight="500" fill="#5A7185" id="architecture-card-surface-baseline-body" data-max-width="244" data-max-height="80" data-line-height="24" text-anchor="middle"><tspan x="930" dy="0">eSSVI fit</tspan><tspan x="930" dy="24">Dupire handoff</tspan><tspan x="930" dy="24">PDE audit</tspan></text>
