<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 448" width="760" height="448" role="img" aria-labelledby="architecture-title architecture-desc">
  <title id="architecture-title">Architecture systems view</title>
  <desc id="architecture-desc">Typed public routes feed a reviewable workflow with explicit repair, smooth handoff, local-vol extraction, and PDE validation checkpoints before proof outputs and diagnostics remain downstream. Volatility, local-vol, and numerics sit below as supporting layers.</desc>
  <defs>
    <marker id="arrow-light" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2C679C"/>
    </marker>
    <style>
      text {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        fill: #16314F;
      }
      .eyebrow {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        fill: #6D86A2;
      }
      .hero-title {
        font-size: 27px;
        font-weight: 700;
      }
      .hero-copy {
        font-size: 15px;
        fill: #637C98;
      }
      .side-title {
        font-size: 23px;
        font-weight: 700;
      }
      .stage-title {
        font-size: 22px;
        font-weight: 700;
      }
      .spine {
        stroke: #8AB3DB;
        stroke-width: 6;
        stroke-linecap: round;
      }
      .arrow {
        stroke: #2C679C;
        stroke-width: 3;
        stroke-linecap: round;
      }
      .connector {
        stroke: #B8CBDE;
        stroke-width: 2.2;
        stroke-linecap: round;
      }
      .node {
        fill: #0F66B7;
        stroke: #FFFFFF;
        stroke-width: 4;
      }
      .accent-line {
        stroke: #9BB7D4;
        stroke-width: 3;
        stroke-linecap: round;
      }
      .layer-title {
        font-size: 19px;
        font-weight: 700;
      }
      .layer-line {
        stroke: #9BB7D4;
        stroke-width: 4;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <text class="eyebrow" x="380" y="44" text-anchor="middle">Reviewable quant core</text>
  <text class="hero-title" x="380" y="76" text-anchor="middle">One reviewable workflow from</text>
  <text class="hero-title" x="380" y="105" text-anchor="middle">public routes to proof outputs</text>
  <text class="hero-copy" x="380" y="132" text-anchor="middle">Authority comes from visible checkpoints, not boxed subsystems.</text>

  <text class="eyebrow" x="24" y="220">Public surface</text>
  <text class="side-title" x="24" y="252">Typed</text>
  <text class="side-title" x="24" y="280">routes</text>
  <line class="accent-line" x1="24" y1="294" x2="114" y2="294"/>

  <text class="eyebrow" x="748" y="220" text-anchor="end">Proof edge</text>
  <text class="side-title" x="748" y="252" text-anchor="end">Proof</text>
  <text class="side-title" x="748" y="280" text-anchor="end">outputs</text>
  <text class="hero-copy" x="748" y="305" text-anchor="end">diagnostics</text>
  <line class="accent-line" x1="650" y1="320" x2="748" y2="320"/>

  <path class="spine" d="M 150 248 H 610"/>
  <path class="arrow" d="M 112 248 H 210" fill="none" marker-end="url(#arrow-light)"/>
  <path class="arrow" d="M 614 248 H 648" fill="none" marker-end="url(#arrow-light)"/>

  <circle class="node" cx="224" cy="248" r="14"/>
  <circle class="node" cx="352" cy="248" r="14"/>
  <circle class="node" cx="480" cy="248" r="14"/>
  <circle class="node" cx="608" cy="248" r="14"/>

  <line class="connector" x1="224" y1="206" x2="224" y2="230"/>
  <text class="stage-title" x="224" y="190" text-anchor="middle">Repair</text>

  <line class="connector" x1="352" y1="194" x2="352" y2="230"/>
  <text class="stage-title" x="352" y="156" text-anchor="middle">Smooth</text>
  <text class="stage-title" x="352" y="182" text-anchor="middle">handoff</text>

  <line class="connector" x1="480" y1="266" x2="480" y2="300"/>
  <text class="stage-title" x="480" y="318" text-anchor="middle">Local-vol</text>
  <text class="stage-title" x="480" y="344" text-anchor="middle">extraction</text>

  <line class="connector" x1="608" y1="266" x2="608" y2="300"/>
  <text class="stage-title" x="608" y="318" text-anchor="middle">PDE</text>
  <text class="stage-title" x="608" y="344" text-anchor="middle">validation</text>

  <text class="eyebrow" x="380" y="378" text-anchor="middle">Supporting layers</text>

  <text class="layer-title" x="240" y="406" text-anchor="middle">Volatility</text>
  <line class="layer-line" x1="184" y1="418" x2="296" y2="418"/>

  <text class="layer-title" x="380" y="406" text-anchor="middle">Local-vol</text>
  <line class="layer-line" x1="324" y1="418" x2="436" y2="418"/>

  <text class="layer-title" x="520" y="406" text-anchor="middle">Numerics</text>
  <line class="layer-line" x1="464" y1="418" x2="576" y2="418"/>
</svg>
