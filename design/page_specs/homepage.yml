page_key: homepage
page_path: docs/index.md
archetype: homepage
intent:
  - Establish what the library does within one screen.
  - Make the proof path and benchmark case-study route easy to reach.
  - Present one signature proof figure with only secondary supporting diagnostics.
quality_targets:
  - No overflow or clipping at supported breakpoints.
  - Hero copy, CTA row, and signature proof scan in under 15 seconds.
  - The signature proof figure looks complete and non-empty in light and dark mode.
  - Supporting diagnostics stay visibly subordinate to the main proof figure.
required_sections:
  - portfolio hero
  - primary CTA row
  - signature proof figure
  - supporting proof diagnostics
  - proof-page routes
allowed_edits:
  - Refine hero spacing, CTA layout, and section ordering.
  - Strengthen the signature proof figure and keep supporting diagnostics secondary.
  - Tighten proof-page routing density without turning the page into a card wall.
forbidden_edits:
  - Change headline claims without an explicit content request.
  - Remove the proof-path CTA or the signature proof figure.
  - Replace evidence sections with generic marketing copy.
review_rules:
  heading_hierarchy: Strong single h1, clear h2 grouping, no skipped section intent.
  visual_density: Hero and signature-proof sections should feel substantial, not sparse or crowded.
  theme_parity: Light and dark variants must feel equally complete and readable.
  primary_vs_secondary: Hero copy is opening context, the signature proof figure is dominant, and routes/supporting diagnostics are secondary.
